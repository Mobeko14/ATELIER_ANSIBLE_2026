- hosts: local
  become: true

  vars:
    page_title: "Serveur déployé avec Ansible"
    author: "Edouard MOBEKO"
    app_user: "edouard"

  tasks:
    - name: Installer nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Démarrer nginx
      service:
        name: nginx
        state: started
        enabled: true

    - name: Déployer page web dynamique
      template:
        src: templates/index.html.j2
        dest: /var/www/html/index.html
